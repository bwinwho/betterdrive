name: Notes v1.5.0

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  notes:
    runs-on: ubuntu-latest
    steps:
      - name: v1.5.0
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > notes.md <<'EOF'
          The "stop flashing at me" release.

          ## No more black flashes
          - Refreshing the folder you're already looking at (a file-watcher tick, even a spurious Windows one) used to reload the whole view: it flashed the loading skeleton and threw your scroll back to the top. It now syncs in place instead. No skeleton, no scroll jump, and if nothing actually changed it does nothing at all. A real change swaps in quietly and keeps your scroll exactly where it was.
          - Cold-loading a big folder now shows a proper shimmer grid instead of a blip of black.

          ## Remembers where you were
          - Switch to another app, come back, wake from standby: BetterDrive now drops you back into the exact folder you had open, deep path and all, instead of resetting to the world root. If that folder got deleted while you were away it quietly falls back to the root.

          ## Fixes
          - Rename now fires only when you click the actual filename text, not anywhere on the card, so folders and files open normally again.
          - File type colour is now a very subtle coloured shadow instead of a hard left border.
          - Smaller folder-card title font.
          - The top-right button shows the BetterDrive icon instead of an exclamation mark.

          ## Removed
          - Internal card drag-and-drop (it wasn't pulling its weight). Dragging files in from Explorer to upload still works.
          EOF
          gh release edit v1.5.0 --repo "${{ github.repository }}" --notes-file notes.md
