<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>BetterDrive — Standby</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;background:#0A0A09;overflow:hidden}
  body{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    font-family:Georgia,serif;color:#EAE4D6;text-align:center;cursor:pointer;
    -webkit-app-region:no-drag;user-select:none;
  }
  .headline{font-size:20px;font-weight:500;opacity:0;animation:fadeIn 1.2s ease forwards}
  .sub{
    font-family:'Courier New',monospace;font-size:11px;letter-spacing:.08em;color:#8E887B;
    margin-top:14px;opacity:0;animation:fadeIn 1.2s ease .2s forwards;
  }
  @keyframes fadeIn{to{opacity:1}}
  @media(prefers-color-scheme:light){
    html,body{background:#F5F1E6}
    body{color:#2A2621}
    .sub{color:#7A7263}
  }
</style>
</head>
<body>
  <div class="headline">BetterDrive is Taking a Power Nap ⚡</div>
  <div class="sub">Click or press Enter to wake it up. Your battery will thank you.</div>
  <script>
    function wake(){ location.href = 'index.html'; }
    document.addEventListener('click', wake);
    document.addEventListener('keydown', e => { if (e.key === 'Enter') wake(); });
  </script>
</body>
</html>
